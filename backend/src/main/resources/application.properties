# =============================================================
# Database Configuration (Smart Campus Operations Hub)
# =============================================================

# Using H2 In-Memory Database for local development (Fast start)
spring.datasource.url=jdbc:h2:mem:smartcampusdb
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=password
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect

# Enables H2 Console to view tables at http://localhost:8080/h2-console
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# Hibernate Auto-generation (Generates tables from your Model classes)
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

# =============================================================
# JWT Configuration
# =============================================================
app.jwt.secret=${JWT_SECRET:your-256-bit-base64-encoded-secret-key-here-minimum-256-bits-required-for-hs256}
app.jwt.expiration-ms=86400000

# =============================================================
# CORS Configuration
# =============================================================
app.cors.allowed-origins=http://localhost:5173,http://localhost:3000

# =============================================================
# OAuth2 Configuration (Google & GitHub)
# =============================================================
spring.security.oauth2.client.registration.google.client-id=${GOOGLE_CLIENT_ID:your-google-client-id}
spring.security.oauth2.client.registration.google.client-secret=${GOOGLE_CLIENT_SECRET:your-google-client-secret}
spring.security.oauth2.client.registration.google.scope=profile,email
spring.security.oauth2.client.registration.google.redirect-uri=http://localhost:8080/login/oauth2/code/google

spring.security.oauth2.client.registration.github.client-id=${GITHUB_CLIENT_ID:your-github-client-id}
spring.security.oauth2.client.registration.github.client-secret=${GITHUB_CLIENT_SECRET:your-github-client-secret}
spring.security.oauth2.client.registration.github.scope=read:user,user:email
spring.security.oauth2.client.registration.github.redirect-uri=http://localhost:8080/login/oauth2/code/github

# =============================================================
# For MySQL (Uncomment and configure when ready for production)
