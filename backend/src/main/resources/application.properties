# =============================================================
# Database Configuration (Smart Campus Operations Hub)
# =============================================================

# Using H2 In-Memory Database for local development (Fast start)
spring.datasource.url=jdbc:h2:mem:smartcampusdb
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=password
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect

# Enables H2 Console to view tables at http://localhost:8080/h2-console
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# Hibernate Auto-generation (Generates tables from your Model classes)
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

